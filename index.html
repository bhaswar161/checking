<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Studyhub Auth</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="bg-orb orb-1"></div>
    <div class="bg-orb orb-2"></div>

    <main class="auth-shell">
      <header class="hero-header">
        <p class="kicker">Smart learning starts here</p>
        <h1>Welcome to Studyhub</h1>
        <p class="subtext">
          Secure login with OTP verification and one-tap social sign-in.
        </p>
      </header>

      <section class="auth-card" aria-label="Studyhub authentication">
        <div class="tab-bar" role="tablist" aria-label="Authentication mode">
          <button class="tab active" id="login-tab" data-mode="login" role="tab" aria-selected="true">
            Login
          </button>
          <button class="tab" id="signup-tab" data-mode="signup" role="tab" aria-selected="false">
            Create Account
          </button>
        </div>

        <form id="auth-form" novalidate>
          <div class="field-grid">
            <label class="field">
              <span>Email ID</span>
              <input id="email" type="email" autocomplete="email" placeholder="you@example.com" required />
            </label>

            <label class="field">
              <span>Phone Number</span>
              <input
                id="phone"
                type="tel"
                autocomplete="tel"
                inputmode="numeric"
                maxlength="14"
                placeholder="+1 555 123 4567"
                required
              />
            </label>
          </div>

          <div class="otp-row">
            <button type="button" id="send-otp" class="btn btn-secondary">Send OTP</button>
            <label class="field otp-field">
              <span>Enter OTP</span>
              <input id="otp" type="text" inputmode="numeric" maxlength="6" placeholder="6-digit code" required />
            </label>
            <button type="submit" id="verify-btn" class="btn btn-primary">Verify & Continue</button>
          </div>

          <div class="helper-row">
            <p id="otp-hint" class="otp-hint" aria-live="polite"></p>
            <p id="status" class="status" aria-live="polite"></p>
          </div>
        </form>

        <div class="divider" role="separator"><span>or continue with</span></div>

        <div class="social-grid">
          <button class="btn social google" data-provider="Google" type="button">
            <span class="icon" aria-hidden="true">G</span>
            Continue with Google
          </button>
          <button class="btn social facebook" data-provider="Facebook" type="button">
            <span class="icon" aria-hidden="true">f</span>
            Continue with Facebook
          </button>
        </div>
      </section>
    </main>

    <dialog id="access-dialog" class="access-dialog">
      <form method="dialog" id="access-form">
        <h2 id="access-title">Grant Access</h2>
        <p id="access-description">Select the permissions you want to grant.</p>

        <div class="permission-list">
          <label><input type="checkbox" name="scope" value="profile" checked /> Basic profile info</label>
          <label><input type="checkbox" name="scope" value="email" checked /> Email address</label>
          <label><input type="checkbox" name="scope" value="contacts" /> Contacts (optional)</label>
        </div>

        <div class="dialog-actions">
          <button type="button" id="cancel-access" class="btn btn-secondary">Cancel</button>
          <button type="submit" id="grant-access" class="btn btn-primary">Grant Access</button>
        </div>
      </form>
    </dialog>

    <script src="app.js"></script>
  </body>
</html>
