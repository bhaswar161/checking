<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Studyhub Auth</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="background-glow"></div>
    <header class="site-header">
      <h1>Welcome to Studyhub</h1>
      <p>Your gateway to focused learning, now secured with smart OTP login.</p>
    </header>

    <main class="auth-wrapper" aria-live="polite">
      <section class="auth-card">
        <div class="auth-tabs" role="tablist" aria-label="Auth options">
          <button id="loginTab" class="tab active" role="tab" aria-selected="true">Login</button>
          <button id="signupTab" class="tab" role="tab" aria-selected="false">Create Account</button>
        </div>

        <form id="authForm" class="auth-form" novalidate>
          <label for="email">Email ID</label>
          <input id="email" name="email" type="email" placeholder="you@example.com" required />

          <label for="phone">Phone Number</label>
          <input
            id="phone"
            name="phone"
            type="tel"
            placeholder="+1 555 123 4567"
            required
            pattern="^[+]?[-\s\d()]{8,}$"
          />

          <div class="otp-row">
            <button type="button" id="sendOtpBtn" class="btn btn-secondary">Send OTP</button>
            <span id="otpHint" class="hint">OTP will be sent after valid details.</span>
          </div>

          <label for="otp">Enter OTP</label>
          <div class="otp-input-wrap">
            <input id="otp" name="otp" type="text" inputmode="numeric" maxlength="6" placeholder="6-digit OTP" />
            <span id="otpTimer" class="timer hidden">Expires in <strong>02:00</strong></span>
          </div>

          <button type="submit" class="btn btn-primary">Verify & Continue</button>
        </form>

        <div class="divider"><span>or continue with</span></div>
        <div class="social-login">
          <button class="btn social google" data-provider="Google" type="button">
            <span>G</span> Google
          </button>
          <button class="btn social facebook" data-provider="Facebook" type="button">
            <span>f</span> Facebook
          </button>
        </div>

        <p id="status" class="status" role="status"></p>
      </section>
    </main>

    <dialog id="oauthDialog" class="oauth-dialog">
      <h2 id="oauthTitle">Authorize</h2>
      <p>Allow this app to access your basic profile and verified email?</p>
      <div class="dialog-actions">
        <button id="denyAccess" class="btn btn-secondary" type="button">Deny</button>
        <button id="allowAccess" class="btn btn-primary" type="button">Allow Access</button>
      </div>
    </dialog>

    <script src="script.js"></script>
  </body>
</html>
